kind = "web"
previewPath = "/"
title = "MindBreaker"
version = "1.0.0"
id = "artifacts/mindbreaker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23839

[services.development]
run = "pnpm --filter @workspace/mindbreaker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mindbreaker", "run", "build" ]
publicDir = "artifacts/mindbreaker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23839"
BASE_PATH = "/"
